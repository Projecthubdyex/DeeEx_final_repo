<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeeEx — Reset Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Set new password</h2>
            <p class="auth-sub">Enter your new password below.</p>

            <form id="resetForm">
                <div class="fg">
                    <label for="newPassword">New password</label>
                    <input type="password" id="newPassword" placeholder="New password" required>
                </div>
                <div class="fg">
                    <label for="confirmNewPassword">Confirm new password</label>
                    <input type="password" id="confirmNewPassword" placeholder="Repeat new password" required>
                </div>
                <button type="submit" class="btn-full">Update password</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</body>
</html>
